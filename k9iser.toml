#
# k9iser manifest for wokelangiser
# Wokelang iser — reads Wokelang source and generates K9 contracts

[project]
name = "wokelangiser"
safety_tier = "hunt"

[[source]]
path = "Cargo.toml"
type = "cargo"
output = "generated/k9iser/cargo-manifest.k9"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[source]]
path = "Containerfile"
type = "containerfile"
output = "generated/k9iser/container-build.k9"

[[source]]
path = ".github/workflows/hypatia-scan.yml"
type = "workflow"
output = "generated/k9iser/ci-security.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"

[[constraint]]
rule = "container.base_image uses chainguard or distroless"
severity = "warn"

[[constraint]]
rule = "workflows includes hypatia-scan"
severity = "error"

[[constraint]]
rule = "binary outputs to stdout in JSON format"
severity = "warn"
